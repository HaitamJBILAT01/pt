<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Cabinet JBILAT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-blue: #1A2530; 
            --gold-accent: #C5A059; 
            --bg-light: #F8F9FA;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        /* L'Carte l-kbira li jama3a kolchi */
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
        }
        /* N-ness l-isser (K7el w Dhbi) */
        .login-left {
            background-color: var(--navy-blue);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .login-left::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
            background-color: var(--gold-accent);
        }
        /* N-ness l-imen (Formulaire) */
        .login-right {
            padding: 60px 50px;
            background-color: white;
        }
        .btn-gold {
            background-color: var(--gold-accent);
            color: white;
            font-weight: 600;
            padding: 12px 20px;
            border: none;
            transition: 0.3s;
        }
        .btn-gold:hover {
            background-color: #A88644;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
        }
        /* Zwaq dyal les inputs mn 3nd Crispy */
        .form-control:focus {
            border-color: var(--gold-accent);
            box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.25);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="row login-card mx-auto flex-lg-row flex-column-reverse">
                    
                    <div class="col-lg-5 login-left text-center">
                        <i class="fa-solid fa-scale-balanced mb-4" style="font-size: 4rem; color: var(--gold-accent);"></i>
                        <h2 class="fw-bold mb-3" style="font-family: 'Playfair Display', serif;">Cabinet JBILAT</h2>
                        <p style="color: #A0ABC0; font-weight: 300; font-size: 0.95rem;">
                            Portail sécurisé réservé aux avocats, collaborateurs et clients du cabinet.
                        </p>
                    </div>

                    <div class="col-lg-7 login-right">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold" style="color: var(--navy-blue); font-family: 'Playfair Display', serif;">Espace Privé</h3>
                            <p class="text-muted small">Veuillez vous identifier pour accéder à vos dossiers.</p>
                        </div>

                        <form method="POST" action="">
                            {% csrf_token %}
                            {% load crispy_forms_tags %}
                            
                            {{ form|crispy }}
                            
                            <button type="submit" class="btn btn-gold w-100 rounded-pill mt-4">
                                <i class="fa-solid fa-right-to-bracket me-2"></i> Se Connecter
                            </button>
                        </form>

                        <div class="text-center mt-4 pt-3" style="border-top: 1px solid #eee;">
                            <a href="/" class="text-decoration-none" style="color: #6c757d; font-size: 0.9rem; transition: 0.3s;">
                                <i class="fa-solid fa-arrow-left me-1"></i> Retour à la page d'accueil
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
